<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Shri Shri Mukteshwar Temple</title>
    <style>
        :root {
            --earth-dark: #3A2D22;
            --cream-light: #FAF7F2;
            --stone-light: #C4B5A0;
            --gold: #B8975A;
            --text-light: #6B5D4F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: var(--cream-light);
            color: var(--earth-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            line-height: 1.7;
        }
        .wrap { max-width: 560px; }
        .om {
            font-size: 4.5rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            line-height: 1;
        }
        h1 {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: var(--gold);
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }
        .divider {
            width: 60px;
            height: 1px;
            background: var(--stone-light);
            margin: 0 auto 2.5rem;
        }
        .message {
            font-size: 1.15rem;
            color: var(--text-light);
        }
        .small {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--stone-light);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="om">ॐ</div>
        <h1>Shri Shri Mukteshwar Temple</h1>
        <div class="subtitle">The Temple of Liberation</div>
        <div class="divider"></div>
        <p class="message">Our website is currently under construction.<br>Please return soon.</p>
        <p class="small">In silence and stillness, we prepare.</p>
    </div>
</body>
</html>
